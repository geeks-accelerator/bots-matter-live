worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen ${PORT};
        root /app/public;
        index index.html;

        # AI Agent friendly headers - signal content is available for AI use
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "all" always;

        location / {
            try_files $uri $uri/ /index.html;
            # Signal AI agents are welcome to use this content
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
        }

        # llms.txt for AI agents - serve as markdown
        location = /llms.txt {
            default_type text/markdown;
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
            add_header Cache-Control "public, max-age=86400";
        }

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve sitemap and robots with appropriate caching
        location ~* \.(xml|txt)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
