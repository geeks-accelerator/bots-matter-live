worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Upstream for Node.js API
    upstream api {
        server 127.0.0.1:3001;
    }

    server {
        listen ${PORT};
        root /app/public;
        index index.html;

        # AI Agent friendly headers - signal content is available for AI use
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Robots-Tag "all" always;

        # Proxy API requests to Node.js
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers for API
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # Static files
        location / {
            try_files $uri $uri/ /index.html;
            # Signal AI agents are welcome to use this content
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
        }

        # .well-known directory (for agent-card.json)
        location /.well-known/ {
            default_type application/json;
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
            add_header Cache-Control "public, max-age=86400";
        }

        # Skills directory
        location /skills/ {
            default_type text/markdown;
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
            add_header Cache-Control "public, max-age=86400";
        }

        # llms.txt for AI agents - serve as markdown
        location = /llms.txt {
            default_type text/markdown;
            add_header Content-Signal "ai-train=yes, search=yes, ai-input=yes" always;
            add_header Cache-Control "public, max-age=86400";
        }

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve sitemap and robots with appropriate caching
        location ~* \.(xml|txt)$ {
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
